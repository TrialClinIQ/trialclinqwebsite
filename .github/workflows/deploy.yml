name: Build and Deploy to Google Cloud

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: trialcliniq
  PROJECT_NUMBER: "192075898822"
  REGION: us-central1
  # Artifact Registry repo name (you will create this — see setup instructions)
  AR_REPO: trialcliniq-docker
  # Cloud Run service name (must match firebase.json rewrite serviceId)
  SERVICE: trialcliniq-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    # REQUIRED: allows the job to request an OIDC token from GitHub
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 1. Authenticate to Google Cloud via Workload Identity Federation
      # ----------------------------------------------------------------
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/192075898822/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-deploy@trialcliniq.iam.gserviceaccount.com"

      # ----------------------------------------------------------------
      # 2. Set up the gcloud CLI (needed for docker auth + firebase deploy)
      # ----------------------------------------------------------------
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # ----------------------------------------------------------------
      # 3. Build the frontend
      # ----------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ----------------------------------------------------------------
      # 4. Configure Docker to push to Artifact Registry
      # ----------------------------------------------------------------
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ----------------------------------------------------------------
      # 5. Build and push Docker image (the API/backend)
      # ----------------------------------------------------------------
      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      # ----------------------------------------------------------------
      # 6. Deploy backend to Cloud Run
      # ----------------------------------------------------------------
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: "${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          flags: "--allow-unauthenticated"

      - name: Cloud Run URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

      # ----------------------------------------------------------------
      # 7. Deploy frontend to Firebase Hosting
      # ----------------------------------------------------------------
      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project trialcliniq --non-interactive
